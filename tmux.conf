# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind _ split-window -v
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
unbind r
bind r source-file ~/.tmux.conf

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on
set -g set-clipboard on

# Command Sequence for Nested Tmux Sessions
bind-key a send-prefix

# switch panes using hjkl without prefix
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# don't rename windows automatically
set-option -g allow-rename off

# C-a C-a for the Last Active Window
bind-key C-a last-window

# Start Window Numbering at 1
set -g base-index 1

# Faster Command Sequences
set -s escape-time 0

# Aggressive Resize
setw -g aggressive-resize on

# Theme
##### Catppuccin Mocha tmux theme — no plugin #####

# Catppuccin Mocha palette
set -g @ctp_rosewater "#f5e0dc"
set -g @ctp_flamingo  "#f2cdcd"
set -g @ctp_pink      "#f5c2e7"
set -g @ctp_mauve     "#cba6f7"
set -g @ctp_red       "#f38ba8"
set -g @ctp_maroon    "#eba0ac"
set -g @ctp_peach     "#fab387"
set -g @ctp_yellow    "#f9e2af"
set -g @ctp_green     "#a6e3a1"
set -g @ctp_teal      "#94e2d5"
set -g @ctp_sky       "#89dceb"
set -g @ctp_sapphire  "#74c7ec"
set -g @ctp_blue      "#89b4fa"
set -g @ctp_lavender  "#b4befe"

set -g @ctp_text      "#cdd6f4"
set -g @ctp_subtext1  "#bac2de"
set -g @ctp_subtext0  "#a6adc8"
set -g @ctp_overlay2  "#9399b2"
set -g @ctp_overlay1  "#7f849c"
set -g @ctp_overlay0  "#6c7086"
set -g @ctp_surface2  "#585b70"
set -g @ctp_surface1  "#45475a"
set -g @ctp_surface0  "#313244"
set -g @ctp_base      "#1e1e2e"
set -g @ctp_mantle    "#181825"
set -g @ctp_crust     "#11111b"

# Status bar
set -g status on
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

# Left side: session
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cba6f7]"

# Right side: date/time
set -g status-right "#[fg=#45475a,bg=#1e1e2e]#[fg=#cdd6f4,bg=#45475a] %Y-%m-%d #[fg=#cba6f7,bg=#45475a]#[fg=#1e1e2e,bg=#cba6f7,bold] %H:%M "

# Windows
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#1e1e2e,bg=#313244]#[fg=#cdd6f4,bg=#313244] #I:#W #[fg=#313244,bg=#1e1e2e]"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W #[fg=#89b4fa,bg=#1e1e2e]"

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Messages / prompts
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Copy mode / selection
set -g mode-style "bg=#cba6f7,fg=#1e1e2e"

# Clock
setw -g clock-mode-colour "#cba6f7"
