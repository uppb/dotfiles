palette = "catppuccin_mocha"
format = "$directory$fill$git_branch$git_status${custom.docker_context}$java$python$golang$nix_shell${custom.direnv}${custom.vim_shell}$line_break$character"
right_format = "$status$cmd_duration"

[palettes.catppuccin_mocha]
bg0 = "#1e1e2e"
bg1 = "#313244"
fg1 = "#cdd6f4"
gray = "#6c7086"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
purple = "#cba6f7"
aqua = "#94e2d5"
orange = "#fab387"

[cmd_duration]
format = "[î‚³](fg:gray)[ $duration ]($style)"
style = "fg:fg1"

[custom]
[custom.direnv]
format = "[î‚³](fg:gray)[ $symbol ]($style)"
style = "fg:gray"
symbol = "[â–¼](fg:fg1)"
when = "test \"$DIRENV_WATCHES\" != \"\""

[custom.vim_shell]
format = "[î‚³](fg:gray)[ $symbol ]($style)"
style = "fg:gray"
symbol = "[îک«](fg:green)"
when = "test \"$VIMRUNTIME\" != \"\""

[custom.docker_context]
command = "docker context show 2>/dev/null"
format = "[î‚³](fg:gray)[ docker $output ]($style)"
style = "fg:blue"
shell = ["sh"]
when = '''
ctx=$(docker context show 2>/dev/null) || exit 1
case "$ctx" in
  default|desktop-linux|orbstack|"") exit 1 ;;
esac

dir=$PWD
while [ "$dir" != "/" ]; do
  for file in compose.yml compose.yaml docker-compose.yml docker-compose.yaml Dockerfile; do
    [ -e "$dir/$file" ] && exit 0
  done
  dir=$(dirname "$dir")
done

exit 1
'''

[directory]
format = "[ $path ]($style)"
style = "fg:blue"
truncate_to_repo = false

[fill]
symbol = " "

[git_branch]
format = "[ git:$branch(:$remote_branch) ]($style)"
style = "fg:green"

[git_metrics]
added_style = "fg:yellow"
deleted_style = "fg:red"
disabled = false
format = "([+$added]($added_style))[]($added_style)"

[git_status]
ahead = "â‡،$count"
behind = "â‡£$count"
diverged = "â‡،$ahead_countâ‡£$behind_count"
format = "[î‚³](fg:gray)[$all_status$ahead_behind]($style)"
modified = "[!$count ](fg:yellow)"
style = "fg:yellow"
untracked = "[?$count ](fg:blue)"

[hg_branch]
format = "[ $symbol$branch ]($style)"
symbol = "ïگک "

[java]
format = "[î‚³](fg:gray)[ java $version ]($style)"
style = "fg:orange"
symbol = ""
version_format = "${raw}"

[golang]
format = "[î‚³](fg:gray)[ go $version ]($style)"
style = "fg:aqua"
symbol = ""
version_format = "${raw}"

[nix_shell]
format = "[î‚³](fg:gray)[ nix $state $symbol ]($style)"
style = "fg:blue"
symbol = "â‌„ï¸ڈ"

[python]
detect_env_vars = []
format = '[î‚³](fg:gray)[ python $version( \($virtualenv\)) ]($style)'
style = "fg:yellow"
symbol = ""
version_format = "${raw}"

[status]
disabled = false
format = "[ $symbol ]($style)"
map_symbol = true
sigint_symbol = "[âœک](fg:red)"
style = ""
success_symbol = "[âœ”](fg:green)"
symbol = "[âœک](fg:red)"

[character]
success_symbol = "[â‌¯](fg:green)"
error_symbol = "[â‌¯](fg:red)"
vimcmd_symbol = "[â‌®](fg:green)"
vimcmd_visual_symbol = "[â‌®](fg:yellow)"
vimcmd_replace_symbol = "[â‌®](fg:purple)"
vimcmd_replace_one_symbol = "[â‌®](fg:purple)"
